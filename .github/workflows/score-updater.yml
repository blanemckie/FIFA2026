name: WCP Score Updater

on:
  schedule:
    # GitHub silently throttles/drops */5 schedules under load.
    # Running every 2 minutes across two offset crons gives near-continuous
    # coverage while staying within GitHub's reliable execution window.
    - cron: '*/2 * * * *'
    - cron: '1-59/2 * * * *'
  workflow_dispatch:
  # Re-enable the schedule automatically if it gets suspended due to inactivity.
  # Any push to main reactivates a suspended schedule.
  push:
    branches:
      - main
    paths:
      - '.github/workflows/score-updater.yml'
      - 'score-updater.js'

concurrency:
  group: wcp-score-updater
  cancel-in-progress: true

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin node-fetch@2

      - name: Run score updater
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node score-updater.js

  # Keeps the workflow active so GitHub doesn't suspend the schedule.
  # GitHub suspends scheduled workflows after 60 days of repo inactivity.
  # This job touches a timestamp file once per day to keep the repo "active".
  keep-alive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep workflow alive (daily ping)
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          # Only commit once per day (at ~00:00 UTC) to avoid commit spam
          if [ "$HOUR" = "00" ] && [ "$MINUTE" -lt "5" ]; then
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .github/keep-alive.txt
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/keep-alive.txt
            git commit -m "chore: keep-alive ping [skip ci]" || echo "Nothing to commit"
            git push || echo "Push skipped"
          else
            echo "Not the daily keep-alive window, skipping commit."
          fi
